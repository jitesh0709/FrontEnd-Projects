<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="music.css">
    <title>MUSIC PLAYER</title>
    <script src="https://kit.fontawesome.com/da4454135d.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <div class="music-player">
            <nav>
                <div class="circle">
                    <i class="fa-solid fa-angle-left"></i>
                </div>
                <div class="circle">
                    <i class="fa-solid fa-bars"></i>
                </div>
            </nav>
            <img src="https://static.vecteezy.com/system/resources/thumbnails/037/044/052/small_2x/ai-generated-studio-shot-of-black-headphones-over-music-note-explosion-background-with-empty-space-for-text-photo.jpg" class="song-img">
            <h1>Die with a smile</h1>
            <p>bruno mars</p>

            <audio controls>
                <source src="die-with-a-smile-ladygaga.mp3" type="audio/mpeg">  
            </audio>
        </div>
    </div>

    <script src="music.js"></script>
</body>
</html>
